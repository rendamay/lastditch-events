<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Last Ditch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Source+Code+Pro:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      color: #702963;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      padding: 1.5rem;
    }

    .section-heading {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 32px;
      font-weight: 500;
      color: #702963;
      margin-bottom: 1.5rem;
    }

    hr {
      border: none;
      border-top: 1px solid #CAA5BF;
      margin: 2.5rem 0;
    }

    .event {
      margin-bottom: 2.25rem;
    }

    .event-name {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 0.2rem;
    }

    .event-name a {
      color: #FF1493;
      text-decoration: none;
    }

    .event-name a:hover {
      text-decoration: underline;
    }

    .event-name strong {
      color: #702963;
      font-weight: 700;
    }

    .event-date {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 22px;
      font-weight: 300;
      color: #702963;
      margin-bottom: 0.75rem;
    }

    .event-desc p {
      font-family: 'Source Code Pro', 'Courier New', Courier, monospace;
      font-size: 22px;
      font-weight: 300;
      line-height: 1.65;
      color: #702963;
      margin-bottom: 0.75rem;
    }

    .event-register {
      font-family: 'Source Code Pro', 'Courier New', Courier, monospace;
      font-size: 22px;
      font-weight: 300;
      color: #FF1493;
      text-decoration: none;
      display: inline;
    }

    .event-register:hover {
      text-decoration: underline;
    }

    .past-section {
      opacity: 0.8;
    }

    .event-empty {
      font-family: 'Source Code Pro', 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #702963;
      margin-bottom: 1.5rem;
    }

    .error {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 0.9rem;
      color: #702963;
    }
  </style>
</head>
<body>
  <div id="app"><p class="event-empty">Loading events…</p></div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRz3o0wENBosjJqkDaimBsX7lWgu7dKkOVxhM_NIM-YErRY5uf1udZSBM3WbvtwNZzKZGAlyHVcLlUB/pub?output=csv';

    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function parseCSV(raw) {
      const text = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const rows = [];
      let i = 0;
      const len = text.length;

      while (i < len) {
        const row = [];
        let field = '';
        let inQuotes = false;

        while (i < len) {
          const ch = text[i];

          if (inQuotes) {
            if (ch === '"') {
              if (text[i + 1] === '"') {
                field += '"';
                i += 2;
              } else {
                inQuotes = false;
                i++;
              }
            } else {
              field += ch;
              i++;
            }
          } else {
            if (ch === '"') {
              inQuotes = true;
              i++;
            } else if (ch === ',') {
              row.push(field);
              field = '';
              i++;
            } else if (ch === '\n') {
              break;
            } else {
              field += ch;
              i++;
            }
          }
        }

        row.push(field);
        if (i < len && text[i] === '\n') i++;

        if (row.length > 1 || (row.length === 1 && row[0] !== '')) {
          rows.push(row);
        }
      }

      return rows;
    }

    function parseDate(str) {
      const parts = str.trim().split('/');
      if (parts.length !== 3) return null;
      const [m, d, y] = parts.map(Number);
      if (!m || !d || !y) return null;
      return new Date(y, m - 1, d);
    }

    function getToday() {
      const t = new Date();
      return new Date(t.getFullYear(), t.getMonth(), t.getDate());
    }

    function formatDate(d) {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June',
                      'July', 'August', 'September', 'October', 'November', 'December'];
      return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
    }

    function formatTime(str) {
      const trimmed = str.trim();
      const spaceIdx = trimmed.lastIndexOf(' ');
      if (spaceIdx === -1) return trimmed;
      const timePart = trimmed.slice(0, spaceIdx);
      const mer = trimmed.slice(spaceIdx + 1).toLowerCase();
      const colonIdx = timePart.indexOf(':');
      const secondColon = timePart.indexOf(':', colonIdx + 1);
      const hm = secondColon !== -1 ? timePart.slice(0, secondColon) : timePart;
      return `${hm}${mer}`;
    }

    function formatDateLine(dateObj, start, end) {
      return `${formatDate(dateObj)}, ${formatTime(start)} – ${formatTime(end)}`;
    }

    function renderDesc(raw) {
      const paragraphs = raw.split(/\n\n+/).map(p => p.trim()).filter(p => p.length > 0);
      return paragraphs.map(p => {
        const lines = p.split('\n').map(escapeHTML).join('<br>');
        return `<p>${lines}</p>`;
      }).join('');
    }

    function render(rows) {
      const today = getToday();
      const upcoming = [];
      const past = [];

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row[0] || !row[0].trim()) continue;
        const dateObj = parseDate(row[0]);
        if (!dateObj) continue;
        const event = { dateObj, name: row[1] || '', start: row[2] || '', end: row[3] || '', desc: row[4] || '', link: row[5] || '' };
        if (dateObj >= today) {
          upcoming.push(event);
        } else {
          past.push(event);
        }
      }

      upcoming.sort((a, b) => a.dateObj - b.dateObj);
      past.sort((a, b) => b.dateObj - a.dateObj);

      let html = '';

      html += '<h2 class="section-heading">Upcoming Events</h2>';

      if (upcoming.length === 0) {
        html += '<p class="event-empty">No upcoming events right now — check back soon.</p>';
      } else {
        for (const ev of upcoming) {
          const dateline = escapeHTML(formatDateLine(ev.dateObj, ev.start, ev.end));
          const nameEsc = escapeHTML(ev.name);
          const linkEsc = encodeURI(ev.link);
          html += `<div class="event">`;
          html += `<div class="event-name"><a href="${linkEsc}" target="_blank" rel="noopener">${nameEsc}</a></div>`;
          html += `<div class="event-date">${dateline}</div>`;
          const descHtml = renderDesc(ev.desc);
          const registerLink = ` <a class="event-register" href="${linkEsc}" target="_blank" rel="noopener">See details and register here →</a>`;
          html += `<div class="event-desc">${descHtml.replace(/<\/p>$/, registerLink + '</p>')}</div>`;
          html += `</div>`;
        }
      }

      if (past.length > 0) {
        html += '<hr>';
        html += '<h2 class="section-heading">Past Events</h2>';
        html += '<div class="past-section">';
        for (const ev of past) {
          const dateline = escapeHTML(formatDateLine(ev.dateObj, ev.start, ev.end));
          const nameEsc = escapeHTML(ev.name);
          html += `<div class="event">`;
          html += `<div class="event-name"><strong>${nameEsc}</strong></div>`;
          html += `<div class="event-date">${dateline}</div>`;
          html += `<div class="event-desc">${renderDesc(ev.desc)}</div>`;
          html += `</div>`;
        }
        html += '</div>';
      }

      document.getElementById('app').innerHTML = html;
    }

    function sendHeight() {
      window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
    }

    const ro = new ResizeObserver(sendHeight);
    ro.observe(document.body);

    async function init() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const rows = parseCSV(text);
        render(rows);
      } catch (err) {
        document.getElementById('app').innerHTML = '<p class="error">Could not load events. Please try again later.</p>';
        console.error('Events fetch error:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
